name: RuboCop Safe Corrections Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.rb'

jobs:
  rubocop:
    name: Check Safe-Correctable Offenses
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install RuboCop
        run: gem install rubocop

      - name: Get modified Ruby files
        id: changed-files
        run: |
          # Get the list of modified Ruby files in this PR
          git fetch origin ${{ github.base_ref }}
          MODIFIED_FILES=$(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}...HEAD | grep '\.rb$' || true)
          
          if [ -z "$MODIFIED_FILES" ]; then
            echo "No Ruby files were modified in this PR"
            echo "files_exist=false" >> $GITHUB_OUTPUT
          else
            echo "Modified Ruby files:"
            echo "$MODIFIED_FILES"
            # Save the files to a temporary file
            echo "$MODIFIED_FILES" > modified_files.txt
            echo "files_exist=true" >> $GITHUB_OUTPUT
          fi

      - name: Run RuboCop on modified files
        if: steps.changed-files.outputs.files_exist == 'true'
        run: |
          # Read the modified files and run RuboCop with --display-only-safe-correctable
          FILES=$(cat modified_files.txt | tr '\n' ' ')
          if [ ! -z "$FILES" ]; then
            echo "Running RuboCop with --display-only-safe-correctable on modified files..."
            rubocop --display-only-safe-correctable $FILES
          fi

      - name: Report status
        if: steps.changed-files.outputs.files_exist == 'false'
        run: |
          echo "✓ No Ruby files were modified in this PR - skipping RuboCop check"
